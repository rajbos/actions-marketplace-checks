name: Retry mirror creation failures

on:
  schedule:
    - cron: "0 3 * * *" # nightly
  workflow_dispatch:
    inputs:
      maxItems:
        description: "Maximum queue items to process"
        required: false
        default: "10"

permissions:
  contents: read

jobs:
  retry-mirrors:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run mirror retry processor
        env:
          APP_ID: ${{ vars.APPLICATION_ID }}
          APP_ID_2: ${{ vars.APPLICATION_ID_2 }}
          APP_ID_3: ${{ vars.APPLICATION_ID_3 }}
          APP_ORGANIZATION: actions-marketplace-validations
          APPLICATION_PRIVATE_KEY: ${{ secrets.AUTOMATION_APP_KEY }}
          APPLICATION_PRIVATE_KEY_2: ${{ secrets.AUTOMATION_APP_KEY2 }}
          APPLICATION_PRIVATE_KEY_3: ${{ secrets.AUTOMATION_APP_KEY3 }}
        run: |
          pwsh -NoLogo -File .github/workflows/update-mirrors-retry.ps1 -maxItems ${{ github.event.inputs.maxItems || 10 }}

      - name: Upload retry queue artifact
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: retry-queue
          path: ./retry-queue.json

